project:
  random_state: 42

paths:
  raw_matches_csv: "data/raw/results.csv"
  processed_features_csv: "data/processed/features.csv"
  trained_model_dir: "src/models/artifacts"
  evaluation_dir: "data/processed/evaluation"

features:
  form_window: 5
  elo_k_factor: 25.0
  elo_home_advantage: 100.0
  elo_home_advantage_by_confederation:
    UEFA: 80.0
    CONMEBOL: 110.0
    CONCACAF: 70.0
    CAF: 90.0
    AFC: 80.0
    OFC: 60.0
    UNKNOWN: 100.0
  default_fifa_rank: 75
  # Time-decay for sample weights: a match this many days old gets half the weight
  # of a match played today.  730 = 2-year half-life (recent matches weighted 2x
  # more than matches from 2 years ago, ~7x more than matches from 5 years ago).
  time_decay_halflife_days: 730
  # Phase 4: half-life for recency-weighting within form/attack/defense windows.
  # 180 days means a match 6 months ago counts half as much as the most recent one.
  recency_halflife_days: 180
  # Phase 7: head-to-head window (last N encounters between the two teams)
  h2h_window: 10
  # Phase 7: draw-rate window (last N matches per team)
  draw_rate_window: 5
  # Issue #50: Elo inactivity decay — Elo regresses toward base rating (1500)
  # the longer a team has been inactive.  Half-life in days: after this many
  # days of rest the gap from 1500 is halved.  Set to 0 to disable.
  # Disabled (issue #106): collapses all ELOs to ~1500 when predicting future
  # WC matches (both teams show ~700 days rest), eliminating the primary signal.
  elo_inactivity_halflife: 0

model:
  # Only use matches from this year onward for XGB training/val/test splits.
  # features.csv still contains all history (needed for accurate Elo tracker
  # state), but pre-modern football is too different to be useful as training
  # signal and its near-zero time-decay weights cause XGBoost to not learn.
  min_train_year: 1993
  test_size: 0.15
  val_size: 0.20
  logistic_max_iter: 1500
  logreg_C: 1.0
  mlp_hidden_layers: [256, 128, 64]
  min_model_weight: 0.02
  max_model_weight: 0.80
  min_draw_blend_weight: 0.05
  # Issue #104: tournament model trained on only 100 WC matches — too small to
  # generalize. Disabled until retrained on sufficient data. Set to 99 so no
  # competition weight ever reaches this threshold.
  tournament_model_min_weight: 99
  xgb:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "multi:softprob"
    min_child_weight: 2
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    # Stop if validation mlogloss does not improve for this many boosting rounds (null disables).
    early_stopping_rounds: 25

inference:
  default_competition: "FIFA World Cup Qualification"
  default_neutral: false

evaluation:
  # Rolling-origin backtest settings
  n_backtest_windows: 5
  min_train_frac: 0.60        # Minimum fraction of data used as initial training window
  reports_dir: "reports"      # All Phase 2 outputs land here

simulation:
  # Start date of the WC2026 tournament. Used to filter history and build feature rows.
  tournament_start_date: "2026-06-11"
  # Blend each pre-computed match probability toward the uniform [1/3, 1/3, 1/3]
  # distribution before running Monte Carlo.  Adds tournament variance so that
  # compounding 7-game paths do not over-concentrate championship odds on the
  # highest-Elo teams.  0.0 = no compression, 0.15 = 15% toward uniform.
  tournament_variance_factor: 0.12
  # Known penalty-shootout results not tracked in the source dataset.
  # Each entry adjusts Elo by +K*0.5 for the winner and -K*0.5 for the loser.
  penalty_elo_corrections:
    - winner: "Portugal"
      loser: "Spain"
      note: "UEFA Nations League 2024-25 final, 08 Jun 2025 (2-2 AET, Portugal win on pens)"
